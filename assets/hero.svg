  <text x="108" y="166" fill="#EEF7FF" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700">Fract'ol</text>
  <text x="110" y="208" fill="#8CC7FF" font-family="'Segoe UI', Arial, sans-serif" font-size="22">Interactive fractal explorer in C</text>

  <text x="110" y="280" fill="#DCEBFF" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600">Explore the edge of order and chaos</text>
