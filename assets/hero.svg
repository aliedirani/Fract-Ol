<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="70" y1="40" x2="1180" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081221"/>
      <stop offset="0.45" stop-color="#10223F"/>
      <stop offset="1" stop-color="#050B16"/>
    </linearGradient>
    <linearGradient id="glow" x1="220" y1="90" x2="1030" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EF3FF"/>
      <stop offset="0.4" stop-color="#7B9CFF"/>
      <stop offset="0.72" stop-color="#FF7AD9"/>
      <stop offset="1" stop-color="#FFB15C"/>
    </linearGradient>
    <radialGradient id="spotA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 180) rotate(42) scale(250 180)">
      <stop stop-color="#1ED6FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#1ED6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 540) rotate(42) scale(240 170)">
      <stop stop-color="#FF6AC7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FF6AC7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40" y="-40" width="1360" height="800" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="28" fill="url(#bg)"/>
