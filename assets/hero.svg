  <g font-family="'Segoe UI', Arial, sans-serif">
    <text x="111" y="574" fill="#F4F8FF" font-size="18" font-weight="600">Controls</text>
    <text x="111" y="606" fill="#BBCDE4" font-size="17">Mouse wheel for zoom, arrows for movement,</text>
    <text x="111" y="632" fill="#BBCDE4" font-size="17">C for palettes, A for autoplay.</text>
